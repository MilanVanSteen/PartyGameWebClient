name: Deploy PartyGameWebClient to Azure App Service

on:
  push:
    branches:
      - release   # deploy on push to release branch
  workflow_dispatch:   # allows manual trigger in GitHub Actions

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repo
      - uses: actions/checkout@v4

      # 2. Deploy to Azure
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'PartyGameWebClient'              # your App Service name
          package: '.'                                # root folder of your frontend files
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
