<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocaParty - Student</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>VocaParty</h1></header>

    <main>
        <!-- Join Room Screen -->
        <section id="joinScreen">
            <input id="roomInput" placeholder="ABCD" maxlength="4">
            <button id="joinBtn">Join</button>
            <div id="joinLog"></div>
        </section>

        <section id="nameScreen" class="hidden">
            <input id="nameInput" placeholder="Your name" maxlength="15">
            <button id="nameBtn">Enter</button>
            <div id="nameLog"></div>
        </section>

        <!-- Waiting Screen -->
        <section id="waitingScreen" class="hidden">
            <h2>Waiting for host to start the game...</h2>
            <ul id="playerList"></ul>
        </section>

        <!-- In-game Screen -->
        <section id="gameScreen" class="hidden">
            <div id="diceContainer">
                <img id="diceImage" src="assets/dice/dice1.png" width="80" alt="dice">
            </div>
        </section>

        <!-- PowerUp Screen -->
        <section id="powerupScreen" class="hidden">
            <h2>Use a Powerup</h2>
            <div id="powerupTimerContainer">
                <div id="powerupTimerText">
                    10
                </div>
                <div id="powerupTimerBar">
                    <div id="powerupTimerFill"></div>
                </div>
            </div>

            <ul id="powerupList"></ul>

            <button id="skipPowerupBtn">
                Skip
            </button>
        </section>
    </main>

    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
