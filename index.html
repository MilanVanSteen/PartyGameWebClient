<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Party Game - Student</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>Party Game</h1></header>

    <main>
        <!-- Join Room Screen -->
        <section id="joinScreen">
            <input id="roomInput" placeholder="ABCD" maxlength="4">
            <button id="joinBtn">Join</button>
            <div id="joinLog"></div>
        </section>

        <section id="nameScreen" class="hidden">
            <input id="nameInput" placeholder="Your name" maxlength="15">
            <button id="nameBtn">Enter</button>
            <div id="nameLog"></div>
        </section>

        <!-- Waiting Screen -->
        <section id="waitingScreen" class="hidden">
            <h2>Waiting for host to start the game...</h2>
            <ul id="playerList"></ul>
        </section>

        <!-- In-game Screen -->
        <section id="gameScreen" class="hidden">
            <h2>Game Started!</h2>

            <div id="diceContainer">
                <img id="diceImage" src="assets/dice/dice1.png" width="80" alt="dice">
                <p>Dice roll: <span id="diceValue">-</span></p>
            </div>
        </section>
    </main>

    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
