<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Host Simulator</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
    <h1>Host Simulator</h1>
    <pre id="log"></pre>

    <script>
        const SERVER_URL = "https://partygameserver.up.railway.app/";
        const socket = io(SERVER_URL);

        const logEl = document.getElementById("log");
        function log(msg) {
            logEl.textContent += msg + "\n";
            console.log(msg);
        }

        socket.emit("CREATE_ROOM");
        log("Creating room...");

        let ROOM_CODE = "";

        socket.on("ROOM_CREATED", ({ roomCode }) => {
            ROOM_CODE = roomCode;
            log(`🎉 Room created: ${ROOM_CODE}`);
        });

        //After a 10 seconds, start the game
        // setTimeout(() => {
        //     if (!ROOM_CODE) return log("⚠️ Room not created yet");
        //     socket.emit("START_GAME", { roomCode: ROOM_CODE });
        //     log("🚀 Starting game as host...");
        // }, 10000);

        // Listen to events
        socket.on("PLAYER_JOINED", ({ players }) => {
            log("👤 Players joined: " + players.map(id => id.substring(0,5)).join(", "));
        });
        socket.on("GAME_STARTED", () => log("🎮 Game started!"));
    </script>
</body>
</html>
